{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4 text-light">Agenda de Clientes</h2>

    <!-- Tabla de Agenda -->
    <div class="table-responsive">
        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr>
                    <th scope="col">Nombre</th>
                    <th scope="col">Teléfono</th>
                    <th scope="col">Vencimiento</th>
                    <th scope="col" class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Iteración sobre los datos de la BD -->
                {% for cliente in clientes %}
                <tr data-id="{{ cliente.id }}">
                    <!-- Celdas Editables -->
                    <td class="editable" data-field="nombre">{{ cliente.nombre }}</td>
                    <td class="editable" data-field="telefono">{{ cliente.telefono }}</td>
                    <td class="editable" data-field="fecha_vencimiento">{{ cliente.fecha_vencimiento }}</td>
                    
                    <!-- Botón discreto de acción -->
                    <td class="acciones text-center">
                        <button class="btn-editar-discreto" onclick="activarEdicion(this)" title="Editar fila">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 20h9"></path>
                                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center text-muted">No hay clientes registrados en la agenda.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Estilos integrados para la edición en línea -->
<style>
    /* Botón discreto con tono acero */
    .btn-editar-discreto {
        background: transparent;
        border: none;
        color: #5d6d7e; 
        cursor: pointer;
        padding: 6px;
        opacity: 0.6;
        transition: all 0.3s ease;
    }

    .btn-editar-discreto:hover {
        opacity: 1;
        color: #ecf0f1; 
        transform: scale(1.1);
    }

    /* Inputs oscuros para la edición en línea */
    .input-inline {
        background-color: #1a252f; /* Fondo muy oscuro para el input */
        border: 1px solid #34495e;
        color: #ecf0f1;
        padding: 5px 8px;
        border-radius: 4px;
        font-size: 0.95em;
        width: 100%;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.3s ease;
    }

    .input-inline:focus {
        border-color: #3498db; /* Resalte sutil azul/acero */
    }

    /* Para mantener la celda estable al cambiar a input */
    td.editable {
        min-width: 150px;
    }
</style>

<!-- Script para manejar la lógica de edición -->
<script>
    function activarEdicion(btn) {
        const fila = btn.closest('tr');
        const celdas = fila.querySelectorAll('.editable');
        const esEdicion = fila.classList.contains('editando');

        if (!esEdicion) {
            // 1. Cambiar el texto a campos de entrada (inputs)
            celdas.forEach(celda => {
                const valorActual = celda.innerText.trim();
                const campo = celda.getAttribute('data-field');
                
                // Si es fecha, usamos el input tipo date
                const tipoInput = campo === 'fecha_vencimiento' ? 'date' : 'text';
                
                celda.innerHTML = `<input type="${tipoInput}" class="input-inline" value="${valorActual}">`;
            });
            
            // Cambiar icono a "Guardar" (un check verde)
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            fila.classList.add('editando');
            
        } else {
            // 2. Guardar los datos y volver a modo texto
            const idCliente = fila.getAttribute('data-id');
            const datosActualizados = {};

            celdas.forEach(celda => {
                const input = celda.querySelector('input');
                const valorNuevo = input.value;
                const campo = celda.getAttribute('data-field');
                
                datosActualizados[campo] = valorNuevo;
                celda.innerHTML = valorNuevo; // Devolver a texto normal
            });

            // Restaurar icono original de edición
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>`;
            fila.classList.remove('editando');

            // 3. Enviar a tu backend
            actualizarEnBaseDeDatos(idCliente, datosActualizados);
        }
    }

    function actualizarEnBaseDeDatos(id, datos) {
        // Asegúrate de crear la ruta en app_web.py para manejar este POST
        fetch(`/actualizar_cliente/${id}`, {
            method: 'POST', 
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(datos)
        })
        .then(response => response.json())
        .then(data => {
            if(data.success) {
                console.log('Actualizado correctamente en la BD.');
            } else {
                alert('Hubo un error al actualizar los datos en la base de datos.');
            }
        })
        .catch(error => {
            console.error('Error en la petición:', error);
            alert('Error de conexión con el servidor.');
        });
    }
</script>
{% endblock %}
